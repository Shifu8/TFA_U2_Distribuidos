# Configura el API Gateway y sus rutas hacia hospital-service mediante Consul.
server:
  address: 0.0.0.0
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: api-gateway
        instance-id: ${spring.application.name}-${server.port}
        register: true
        fail-fast: false
        health-check-path: /actuator/health
        prefer-ip-address: true
        ip-address: ${GATEWAY_HOST:localhost}
    gateway:
      httpclient:
        connect-timeout: 1000
        response-timeout: 3000
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - name: Retry
          args:
            retries: 3
            series:
              - SERVER_ERROR
            exceptions:
              - java.io.IOException
              - java.net.ConnectException
              - org.springframework.cloud.gateway.support.TimeoutException
      globalcors:
        cors-configurations:
          "[/**]":
            allowed-origin-patterns:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
              - "http://*:5173"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: false
      routes:
        - id: hospitales
          uri: lb://hospital-service
          predicates:
            - Path=/api/hospitals/**
        - id: nodos
          uri: lb://hospital-service
          predicates:
            - Path=/api/nodes/**
        - id: logs
          uri: lb://hospital-service
          predicates:
            - Path=/api/logs/**
        - id: eleccion
          uri: lb://hospital-service
          predicates:
            - Path=/api/election/**
        - id: simulacion
          uri: lb://hospital-service
          predicates:
            - Path=/api/simulation/**
        - id: donantes
          uri: lb://hospital-service
          predicates:
            - Path=/api/donors/**
        - id: sincronizacion
          uri: lb://hospital-service
          predicates:
            - Path=/api/synchronization/**,/api/sincronizacion/**
        - id: exclusion
          uri: lb://hospital-service
          predicates:
            - Path=/api/exclusion/**
        - id: academicos
          uri: lb://hospital-service
          predicates:
            - Path=/estado,/nodos,/coordinador,/logs,/logs/**,/eleccion/**,/sincronizacion/**,/exclusion/**,/solicitar_organo,/api/estado,/api/status,/api/solicitar_organo

management:
  endpoints:
    web:
      exposure:
        include: health,info
